name: Generate Articles Index

on:
  push:
    paths:
      - '**/*.md'
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies (CommonJS-compatible versions)
        run: npm install @octokit/rest@18.12.0 marked@4.3.0

      - name: Generate articles.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: node .github/scripts/generate-articles.js

      - name: Commit changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add articles.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update articles index [skip ci]"
            git push
          else
            echo "✓ Нет изменений"
          fi
