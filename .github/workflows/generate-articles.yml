name: Generate Articles List

on:
  push:
    paths:
      - 'articles/**'
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate articles.json
        run: |
          # Создаём пустой массив
          echo "[]" > articles.json
          
          # Если папка articles существует и в ней есть .md файлы
          if [ -d "articles" ] && [ "$(ls -A articles/*.md 2>/dev/null)" ]; then
            # Собираем имена файлов без расширения в JSON-массив
            ls articles/*.md 2>/dev/null | \
              xargs -n1 basename | \
              sed 's/\.md$//' | \
              jq -R . | \
              jq -s . > articles.json
          fi
          
          # Показываем результат в логе
          echo "Generated articles.json:"
          cat articles.json

      - name: Commit changes if any
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add articles.json
          
          # Коммитим только если есть изменения
          if ! git diff --staged --quiet; then
            git commit -m "chore: update articles.json [skip ci]"
            git push
          else
            echo "No changes to articles.json"
          fi
