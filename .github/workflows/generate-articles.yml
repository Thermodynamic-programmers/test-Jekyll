name: Generate Articles Index

on:
  push:
    paths:
      - '**/*.md'  # Любые .md файлы в любых папках
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build articles.json
        run: |
          # Ищем все .md файлы, исключая служебные папки
          find . -type f -name "*.md" \
            ! -path "./.github/*" \
            ! -path "./node_modules/*" \
            ! -path "*/node_modules/*" \
            ! -name "README.md" \
            | sed 's|^\./||' \
            | sed 's|\.md$||' \
            | sort \
            | jq -R . \
            | jq -s '.' > articles.json
          
          echo "✓ Сгенерирован articles.json с $(jq length articles.json) статьями"
          cat articles.json

      - name: Push changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add articles.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update articles index [skip ci]"
            git push
          else
            echo "✓ Изменений нет"
          fi
